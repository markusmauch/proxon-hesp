site_name: Proxon P-Serie · HESP-Bus (technische Dokumentation)
site_description: >-
  Technische Dokumentation des internen RS485-Busses (HESP) der Zimmermann
  PROXON P-Serie Lüftungsheizung — physische Schnittstelle, Protokoll und
  Datenpunkte als Grundlage für eigene Implementierungen.
site_url: https://markusmauch.github.io/proxon-hesp/
repo_url: https://github.com/markusmauch/proxon-hesp
repo_name: markusmauch/proxon-hesp
edit_uri: edit/main/docs/
copyright: >-
  © 2026 Markus Mauch · Inhalte unter
  <a href="https://creativecommons.org/licenses/by/4.0/deed.de" rel="license">CC&nbsp;BY&nbsp;4.0</a>
  · Unabhängiges Projekt, nicht mit Zimmermann Lüftungs- und Wärmesysteme affiliiert;
  „PROXON" und weitere genannte Marken gehören ihren jeweiligen Inhabern.

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Dunkles Design
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Helles Design
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Einführung: index.md
  - Anlage & Architektur: anlage.md
  - HESP-Protokoll: protokoll.md
  - Datenpunkt-Referenz: dp-referenz.md
  - Randbedingungen & offene Punkte: offene-punkte.md
